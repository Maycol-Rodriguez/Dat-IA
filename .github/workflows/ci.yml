name: CI

on:
  push:
    branches:
      - main
      - devops/**
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    name: Test and build API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff
        run: uv run ruff check app tests

      - name: Run tests
        run: uv run pytest

      - name: Build Docker image
        run: docker build -t dat-ia-api:ci .

      - name: Run Docker container
        run: |
          docker run -d --name dat-ia-api-ci -p 8000:8000 \
            -e GOOGLE_API_KEY=dummy-ci-key \
            dat-ia-api:ci
          sleep 5

      - name: Check API health
        run: |
          curl --fail http://localhost:8000/health

      - name: Show container logs on failure
        if: failure()
        run: docker logs dat-ia-api-ci || true

      - name: Stop Docker container
        if: always()
        run: docker rm -f dat-ia-api-ci || true
