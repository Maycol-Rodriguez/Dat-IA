services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dat-ia-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
